# Nginx reverse proxy config for RWRGroup Agentic LMS
#
# Installation:
#   sudo cp nginx/lms.conf /etc/nginx/sites-available/lms
#   sudo ln -s /etc/nginx/sites-available/lms /etc/nginx/sites-enabled/lms
#   sudo certbot --nginx -d lms.example.com   # obtain TLS cert
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace lms.example.com with your actual domain throughout.

# Rate limiting zone — applied to the Slack events endpoint.
# Slack sends at most a few requests per second per workspace; 10r/s gives
# comfortable headroom while blocking runaway or malicious traffic.
limit_req_zone $binary_remote_addr zone=slack_events:10m rate=10r/s;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name lms.example.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — main app ──────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lms.example.com;

    # TLS — managed by Certbot; paths updated automatically after `certbot --nginx`
    ssl_certificate     /etc/letsencrypt/live/lms.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lms.example.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "DENY"            always;
    add_header X-XSS-Protection        "1; mode=block"   always;
    add_header Referrer-Policy         "no-referrer"     always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip            on;
    gzip_types      application/json text/plain;
    gzip_min_length 256;

    # ── Health check (no rate limit, no auth) ─────────────────────────────────
    location = /health {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── Slack event / command endpoint ────────────────────────────────────────
    # Rate-limited; burst allows up to 20 queued requests before 503.
    location /slack/events {
        limit_req  zone=slack_events burst=20 nodelay;
        limit_req_status 429;

        proxy_pass             http://127.0.0.1:3000;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;

        # Slack expects a response within 3 seconds; keep timeouts tight.
        proxy_connect_timeout  5s;
        proxy_send_timeout     10s;
        proxy_read_timeout     10s;

        # Pass raw body so Bolt can verify the Slack signature.
        proxy_request_buffering off;
    }

    # ── Catch-all for any other app routes ───────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
