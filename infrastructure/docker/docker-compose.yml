version: "3.9"

services:
  app:
    build: .
    container_name: rwrgroup_lms_app
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${PORT:-3000}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-lms_user}:${POSTGRES_PASSWORD:-lms_password}@postgres:5432/${POSTGRES_DB:-lms_db}
      - REDIS_URL=redis://redis:6379
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET}
      - N8N_BASE_URL=${N8N_BASE_URL:-https://n8n.srv1371300.hstgr.cloud}
      - N8N_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:1.107.4
    container_name: rwrgroup_lms_n8n
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_SECURE_COOKIE=true
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-lms_db}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-lms_user}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-lms_password}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: rwrgroup_lms_postgres
    # SECURITY: always set POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB in .env
    # The fallback values below are for local dev only — never use in production.
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lms_password}
      POSTGRES_DB: ${POSTGRES_DB:-lms_db}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lms_user} -d ${POSTGRES_DB:-lms_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rwrgroup_lms_redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  n8n_data:
