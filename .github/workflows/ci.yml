name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    name: Lint & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lms_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: lms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lms_user"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      SLACK_BOT_TOKEN: xoxb-ci-test-token
      SLACK_SIGNING_SECRET: ci-signing-secret-32-chars-padded
      DATABASE_URL: postgresql://lms_user:ci_password@localhost:5432/lms_test
      REDIS_URL: redis://localhost:6379
      N8N_BASE_URL: http://localhost:5678
      N8N_WEBHOOK_SECRET: ci-webhook-secret
      GOOGLE_SHEETS_BACKUP_ID: ci-spreadsheet-id
      SLACK_ADMIN_WEBHOOK_URL: https://hooks.slack.com/services/ci/test/url

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply database schema
        run: psql "$DATABASE_URL" -f db/schema.sql

      - name: Lint
        run: npm run lint

      - name: Validate env documentation
        run: npm run check:env-docs

      - name: Test
        run: npm test -- --forceExit --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7
