name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e

            REPO_PATH="${{ secrets.DEPLOY_PATH }}"

            echo "==> Pulling latest code..."
            cd "$REPO_PATH"
            git fetch origin master
            git reset --hard origin/master

            echo "==> Tearing down n8n-setup so it re-runs on next up..."
            docker compose rm -sf n8n-setup || true

            echo "==> Rebuilding and restarting services..."
            docker compose pull n8n
            docker compose up -d --build --remove-orphans

            echo "==> Waiting for app health check..."
            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' rwrgroup_lms_app 2>/dev/null || echo "missing")
              echo "  attempt $i: $STATUS"
              if [ "$STATUS" = "healthy" ]; then
                echo "==> App is healthy."
                break
              fi
              if [ "$i" = "12" ]; then
                echo "ERROR: App did not become healthy after 60s"
                docker compose logs --tail=50 app
                exit 1
              fi
              sleep 5
            done

            echo "==> Deployment complete."
            docker compose ps
